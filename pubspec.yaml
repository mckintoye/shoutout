name: shoutout
description: A mobile-first event-based video message app.
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  url_launcher: ^6.2.6

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  cloud_functions: ^5.0.0
  firebase_storage: ^12.4.10

  # Auth Providers
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4

  # Routing
  go_router: ^14.8.1

  # Media / Permissions
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  video_player: ^2.8.6

  # SVG Logos
  flutter_svg: ^2.0.10

  dio: ^5.4.3
  path_provider: ^2.1.4
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/



flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
